<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Maeve — besideU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap');

  :root {
    --dark:  #1A2E35;
    --dark2: #1E3540;
    --teal:  #3DBFBB;
    --mid:   #4A7C7E;
    --light: #f0fcfc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1e24;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  /* ── SQUARE STAGE ── */
  .stage {
    width: min(540px, 96vw);
    height: min(540px, 96vw);
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    background: var(--dark);
    box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(61,191,187,0.15);
  }

  /* ── PARTICLES ── */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0;
    animation: floatP var(--dur,8s) var(--delay,0s) ease-in-out infinite;
  }
  @keyframes floatP {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    20%  { opacity: var(--op,0.12); }
    80%  { opacity: var(--op,0.12); }
    100% { transform: translateY(-60px) scale(0.5); opacity: 0; }
  }

  /* ══════════════════════════════
     SCENE A — MEET MAEVE
  ══════════════════════════════ */
  .scene-a {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--dark);
    z-index: 2;
    opacity: 1;
    transition: opacity 0.9s ease;
    gap: 0;
  }
  .scene-a.out { opacity: 0; pointer-events: none; }

  /* Glow */
  .glow {
    position: absolute;
    width: 72%; height: 72%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,191,187,0.2) 0%, transparent 68%);
    animation: glowPulse 3s ease-in-out infinite;
    top: 50%; left: 50%;
    transform: translate(-50%, -56%);
  }
  @keyframes glowPulse {
    0%,100% { transform: translate(-50%,-56%) scale(1);   opacity: 0.7; }
    50%      { transform: translate(-50%,-56%) scale(1.1); opacity: 1; }
  }

  /* Maeve face */
  .face-wrap {
    position: relative; z-index: 3;
    opacity: 0; transform: scale(0.65);
    animation: popIn 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }
  @keyframes popIn {
    to { opacity: 1; transform: scale(1); }
  }
  .maeve-svg { width: clamp(130px, 30vw, 170px); height: clamp(130px, 30vw, 170px); filter: drop-shadow(0 6px 24px rgba(61,191,187,0.45)); }

  .eye-l, .eye-r { animation: blink 4s ease-in-out 2.2s infinite; transform-origin: center; }
  @keyframes blink { 0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.08)} }
  .ear-l, .ear-r  { animation: earPulse 2.6s ease-in-out 1.8s infinite; }
  @keyframes earPulse { 0%,100%{opacity:0.3} 50%{opacity:0.6} }

  /* Text block */
  .text-block {
    position: relative; z-index: 3;
    text-align: center;
    margin-top: clamp(12px, 3vw, 20px);
    padding: 0 20px;
  }
  .label-intro {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(9px, 2.2vw, 11px);
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0;
    animation: fadeUp 0.7s ease 1.3s forwards;
  }
  .name-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 11vw, 58px);
    font-weight: 600;
    color: #fff;
    line-height: 1.05;
    margin-top: 2px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.6s forwards;
  }
  .name-display em { color: var(--teal); font-style: italic; font-weight: 400; }
  .tagline {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(10px, 2.5vw, 12px);
    color: var(--mid);
    font-weight: 300;
    margin-top: 6px;
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.9s forwards;
  }

  /* besideU wordmark bottom */
  .wordmark {
    position: absolute;
    bottom: 18px; left: 0; right: 0;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s ease 2.2s forwards;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .wm-logo {
    width: 22px; height: 22px;
  }
  .wm-text {
    font-family: 'Poppins', sans-serif;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }
  .wm-text span { color: #1a8ecf; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════
     SCENE B — CHAT (no sidebar)
  ══════════════════════════════ */
  .scene-b {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    z-index: 1;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22,1,0.36,1);
    background: #f5f7f7;
  }
  .scene-b.in { opacity: 1; transform: translateY(0); z-index: 3; }

  /* Topbar */
  .chat-top {
    background: var(--dark);
    padding: clamp(10px,2.5vw,14px) clamp(14px,3.5vw,20px);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .top-face { width: 38px; height: 38px; flex-shrink: 0; }
  .top-info { flex: 1; min-width: 0; }
  .top-name { font-size: clamp(12px,3vw,14px); font-weight: 600; color: #fff; }
  .top-status {
    font-size: clamp(9px,2.2vw,11px); color: var(--teal);
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0;
    animation: sPulse 2s ease-in-out infinite;
  }
  @keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* besideU badge top right */
  .top-badge {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .badge-logo { width: 20px; height: 20px; }
  .badge-text { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); }
  .badge-text span { color: #1a8ecf; }

  /* Messages */
  .chat-msgs {
    flex: 1; background: #ffffff;
    padding: clamp(14px,3.5vw,20px) clamp(14px,3.5vw,18px);
    display: flex; flex-direction: column; gap: clamp(10px,2.5vw,14px);
    overflow-y: auto;
  }
  .chat-msgs::-webkit-scrollbar { width: 0; }

  .msg { display: flex; gap: 8px; align-items: flex-end; opacity: 0; }
  .msg.show { opacity: 1; }

  .av {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: var(--dark2); border: 1.5px solid var(--teal);
    padding: 2px;
  }

  .bubble {
    max-width: 82%;
    padding: clamp(8px,2vw,11px) clamp(11px,2.5vw,14px);
    border-radius: 14px 14px 14px 3px;
    font-size: clamp(11px,2.8vw,13px);
    line-height: 1.58;
    background: var(--light);
    border: 1px solid rgba(61,191,187,0.2);
    color: var(--dark);
  }

  /* Typing */
  .typing-row { display: flex; gap: 8px; align-items: flex-end; }
  .typing-bub {
    display: flex; gap: 4px; align-items: center;
    padding: 11px 14px;
    background: var(--light);
    border: 1px solid rgba(61,191,187,0.2);
    border-radius: 14px 14px 14px 3px;
    opacity: 0; transition: opacity 0.3s;
  }
  .typing-bub.show { opacity: 1; }
  .db {
    width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
    animation: db 1.2s ease-in-out infinite;
  }
  .db:nth-child(2){animation-delay:.2s} .db:nth-child(3){animation-delay:.4s}
  @keyframes db { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-6px);opacity:1} }

  .cursor {
    display: inline-block; width: 2px; height: 13px;
    background: var(--teal); margin-left: 1px; vertical-align: middle;
    animation: cb 0.7s ease-in-out infinite;
  }
  @keyframes cb { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Input bar */
  .chat-input-bar {
    background: #fff;
    border-top: 1px solid #e8eded;
    padding: clamp(10px,2.5vw,13px) clamp(12px,3vw,16px);
    display: flex; gap: 10px; align-items: center; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; background: #f5f7f7;
    border: 1px solid #e0e8e8; border-radius: 24px;
    padding: 9px 16px; font-size: clamp(10px,2.5vw,12px);
    color: var(--dark); font-family: 'Poppins', sans-serif; outline: none;
  }
  .chat-input::placeholder { color: #9ab8bc; }
  .send-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--teal); border: none;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- SCENE A -->
  <div class="scene-a" id="sceneA">
    <div class="glow"></div>

    <div class="face-wrap">
      <svg class="maeve-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="96" fill="rgba(61,191,187,0.05)"/>
        <circle cx="100" cy="100" r="82" fill="#1E3540"/>
        <circle cx="100" cy="100" r="76" fill="#1A2E35"/>
        <circle cx="100" cy="100" r="76" fill="none" stroke="rgba(61,191,187,0.14)" stroke-width="1"/>
        <circle class="ear-l" cx="22"  cy="100" r="18" fill="rgba(61,191,187,0.28)"/>
        <circle class="ear-r" cx="178" cy="100" r="18" fill="rgba(61,191,187,0.28)"/>
        <circle cx="72"  cy="88" r="20" fill="#243e48"/>
        <circle cx="128" cy="88" r="20" fill="#243e48"/>
        <circle class="eye-l" cx="72"  cy="88" r="13" fill="#3DBFBB"/>
        <circle class="eye-r" cx="128" cy="88" r="13" fill="#3DBFBB"/>
        <circle cx="72"  cy="86" r="6" fill="#1A2E35"/>
        <circle cx="128" cy="86" r="6" fill="#1A2E35"/>
        <circle cx="75"  cy="83" r="2.5" fill="#fff" opacity="0.9"/>
        <circle cx="131" cy="83" r="2.5" fill="#fff" opacity="0.9"/>
        <path d="M 66 122 Q 100 148 134 122" stroke="#3DBFBB" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="58"  cy="118" rx="12" ry="7" fill="rgba(61,191,187,0.16)"/>
        <ellipse cx="142" cy="118" rx="12" ry="7" fill="rgba(61,191,187,0.16)"/>
        <circle cx="100" cy="24" r="5" fill="#3DBFBB" opacity="0.55"/>
        <circle cx="82"  cy="28" r="3" fill="#3DBFBB" opacity="0.3"/>
        <circle cx="118" cy="28" r="3" fill="#3DBFBB" opacity="0.3"/>
      </svg>
    </div>

    <div class="text-block">
      <p class="label-intro">Introducing</p>
      <h1 class="name-display">Ma<em>eve</em></h1>
      <p class="tagline">besideU's AI guidance companion<br>for bereavement at work</p>
    </div>

    <div class="wordmark">
      <svg class="wm-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5ECFCA"/>
            <stop offset="100%" stop-color="#4A90C4"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="200" height="200" rx="36" fill="url(#wGrad)"/>
        <path d="M100 162 L46 113 C30 97 30 72 46 56 C62 40 82 40 96 56 L100 61 L104 56 C118 40 138 40 154 56 C170 72 170 97 154 113 Z" fill="white"/>
      </svg>
      <span class="wm-text">beside<span>U</span></span>
    </div>
  </div>

  <!-- SCENE B -->
  <div class="scene-b" id="sceneB">

    <!-- Topbar -->
    <div class="chat-top">
      <!-- Small Maeve face -->
      <svg class="top-face" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="82" fill="#1E3540"/>
        <circle cx="100" cy="100" r="76" fill="#1A2E35"/>
        <circle cx="100" cy="100" r="76" fill="none" stroke="rgba(61,191,187,0.2)" stroke-width="1.5"/>
        <circle cx="22"  cy="100" r="14" fill="rgba(61,191,187,0.28)"/>
        <circle cx="178" cy="100" r="14" fill="rgba(61,191,187,0.28)"/>
        <circle cx="72"  cy="88" r="13" fill="#3DBFBB"/>
        <circle cx="128" cy="88" r="13" fill="#3DBFBB"/>
        <circle cx="72"  cy="86" r="6"  fill="#1A2E35"/>
        <circle cx="128" cy="86" r="6"  fill="#1A2E35"/>
        <circle cx="75"  cy="83" r="2.5" fill="#fff" opacity="0.9"/>
        <circle cx="131" cy="83" r="2.5" fill="#fff" opacity="0.9"/>
        <path d="M 66 122 Q 100 148 134 122" stroke="#3DBFBB" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="top-info">
        <div class="top-name">Maeve</div>
        <div class="top-status"><span class="status-dot"></span>Online — here when you need me</div>
      </div>
      <div class="top-badge">
        <svg class="badge-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5ECFCA"/>
              <stop offset="100%" stop-color="#4A90C4"/>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="200" height="200" rx="36" fill="url(#bGrad)"/>
          <path d="M100 162 L46 113 C30 97 30 72 46 56 C62 40 82 40 96 56 L100 61 L104 56 C118 40 138 40 154 56 C170 72 170 97 154 113 Z" fill="white"/>
        </svg>
        <span class="badge-text">beside<span>U</span></span>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-msgs" id="chatMsgs">
      <div class="typing-row" id="typingRow">
        <svg class="av" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="82" fill="#1E3540"/>
          <circle cx="72"  cy="88" r="11" fill="#3DBFBB"/>
          <circle cx="128" cy="88" r="11" fill="#3DBFBB"/>
          <circle cx="72"  cy="86" r="5"  fill="#1A2E35"/>
          <circle cx="128" cy="86" r="5"  fill="#1A2E35"/>
          <circle cx="74"  cy="84" r="2"  fill="#fff" opacity="0.9"/>
          <circle cx="130" cy="84" r="2"  fill="#fff" opacity="0.9"/>
          <path d="M 68 118 Q 100 140 132 118" stroke="#3DBFBB" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="typing-bub" id="typingBub">
          <div class="db"></div><div class="db"></div><div class="db"></div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-bar">
      <input class="chat-input" type="text" placeholder="Ask Maeve anything…" readonly>
      <button class="send-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  // Particles
  const stage = document.getElementById('stage');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 3.5 + 1.5;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${6+Math.random()*7}s;--delay:${Math.random()*5}s;--op:${0.07+Math.random()*0.15}`;
    stage.insertBefore(p, stage.firstChild);
  }

  // Messages
  const messages = [
    "Hello — I'm Maeve, besideU's AI guidance companion. I'm here to help managers and HR teams support colleagues through bereavement with confidence and care.",
    "Whether you're unsure what to say, need to check your policy, or want to follow up on a colleague — I'm here for every step.",
    "Where would you like to start today?"
  ];

  const chatMsgs  = document.getElementById('chatMsgs');
  const typingRow = document.getElementById('typingRow');
  const typingBub = document.getElementById('typingBub');

  function makeAv() {
    const svg = `<svg class="av" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="82" fill="#1E3540"/>
      <circle cx="72"  cy="88" r="11" fill="#3DBFBB"/>
      <circle cx="128" cy="88" r="11" fill="#3DBFBB"/>
      <circle cx="72"  cy="86" r="5"  fill="#1A2E35"/>
      <circle cx="128" cy="86" r="5"  fill="#1A2E35"/>
      <circle cx="74"  cy="84" r="2"  fill="#fff" opacity="0.9"/>
      <circle cx="130" cy="84" r="2"  fill="#fff" opacity="0.9"/>
      <path d="M 68 118 Q 100 140 132 118" stroke="#3DBFBB" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>`;
    const div = document.createElement('div');
    div.innerHTML = svg;
    return div.firstElementChild;
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeMsg(text) {
    chatMsgs.appendChild(typingRow);
    typingBub.classList.add('show');
    await sleep(800);
    typingBub.classList.remove('show');

    const row = document.createElement('div');
    row.className = 'msg';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    row.appendChild(makeAv());
    row.appendChild(bubble);
    chatMsgs.insertBefore(row, typingRow);
    row.classList.add('show');

    let typed = '';
    for (const ch of text) {
      typed += ch;
      bubble.textContent = typed;
      bubble.appendChild(cursor);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
      await sleep(20 + Math.random() * 18);
    }
    bubble.removeChild(cursor);
    bubble.textContent = typed;
    await sleep(420);
  }

  async function runChat() {
    for (const msg of messages) {
      await typeMsg(msg);
    }
    typingRow.style.display = 'none';
  }

  // Scene transition
  const sceneA = document.getElementById('sceneA');
  const sceneB = document.getElementById('sceneB');

  setTimeout(() => {
    sceneA.classList.add('out');
    setTimeout(() => {
      sceneB.classList.add('in');
      setTimeout(runChat, 500);
    }, 500);
  }, 5500);
</script>
</body>
</html>
